services:
  db:
    image: postgres:15-alpine
    container_name: strom-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    volumes:
      - ./infra/postgres/init-trading.sql:/docker-entrypoint-initdb.d/init-trading.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: strom-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-broker:
    build:
      context: ./packages/mock-broker
    container_name: strom-mock-broker
    ports:
      - "8001:8001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./packages/api
    container_name: strom-api
    volumes:
      - ./packages/api:/app
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./packages/frontend
    container_name: strom-dashboard
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5

  agents:
    build:
      context: ./packages/agents
    container_name: strom-agents
    volumes:
      - ./packages/agents:/app
    env_file:
      - .env.example
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/src/main.py') else 1)" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
