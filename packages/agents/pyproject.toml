[project]
name = "agents"
version = "0.1.0"
description = "Agentic runtime for Trading Platform"
requires-python = ">=3.11"
dependencies = [
    "structlog>=24.1.0",
    "python-dotenv>=1.0.1",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.4.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"
